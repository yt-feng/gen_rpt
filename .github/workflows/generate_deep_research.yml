name: Generate Deep Research Report

on:
  workflow_dispatch:
    inputs:
      topic:
        description: Research topic. You can enter either English or Chinese.
        required: true
        type: string
      slug:
        description: Optional custom output directory slug
        required: false
        default: ""
        type: string
      language:
        description: Report language
        required: false
        default: en
        type: choice
        options:
          - en
          - zh
      target_length:
        description: Optional legacy target length. Leave blank for natural 10-30 page report.
        required: false
        default: ""
        type: string
      model:
        description: DeepSeek model name
        required: false
        default: deepseek-chat
        type: string

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk wkhtmltopdf texlive-xetex texlive-latex-recommended texlive-pictures

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run smoke test
        env:
          REPORT_PAGE_FORMAT: A4
          DISABLE_AI_IMAGES: true
        run: |
          python tests/smoke_test_pipeline.py

      - name: Validate secret
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          if [ -z "$DEEPSEEK_API_KEY" ]; then
            echo "Missing DEEPSEEK_API_KEY secret" >&2
            exit 1
          fi

      - name: Generate report
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TARGET_LENGTH: ${{ github.event.inputs.target_length }}
          REPORT_PAGE_FORMAT: A4
          MAX_AI_SECTION_IMAGES: 3
          AI_IMAGE_TIMEOUT: 35
          SHOW_FALLBACK_IMAGES: false
        run: |
          EXTRA_ARGS=""
          if [ -n "$TARGET_LENGTH" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --target-length $TARGET_LENGTH"
          fi
          python -m gen_rpt.main \
            --topic "${{ github.event.inputs.topic }}" \
            --slug "${{ github.event.inputs.slug }}" \
            --language "${{ github.event.inputs.language }}" \
            --model "${{ github.event.inputs.model }}" \
            --out-root reports \
            $EXTRA_ARGS

      - name: Commit generated report back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain reports)" ]; then
            git add reports
            git commit -m "Add generated deep research report"
            git push
          else
            echo "No report changes to commit"
          fi
